              </div>
            )}
          </div>

          {/* SETTINGS */}
          <div style={{ background: T.card, border: `1px solid ${T.cardBorder}`, borderRadius: "14px", padding: "18px 20px", marginBottom: "14px" }}>

            {/* Theater switcher chips — shown when live theaters are loaded */}
            {usingLiveData && filteredTheaters.length > 0 && (
              <div style={{ marginBottom: "18px" }}>
                <div style={{ fontSize: "0.68rem", color: T.muted, letterSpacing: "0.08em", marginBottom: "8px" }}>NEARBY THEATERS</div>
                <div style={{ display: "flex", gap: "8px", overflowX: "auto", paddingBottom: "4px", WebkitOverflowScrolling: "touch" }}>
                  {filteredTheaters.map(t => (
                    <button key={t.id} onClick={() => selectTheater(t)}
                      style={{ padding: "7px 13px", borderRadius: "20px", border: `1px solid ${selectedTheater?.id === t.id ? "#f7971e" : T.inputBorder}`, background: selectedTheater?.id === t.id ? "#f7971e22" : T.input, color: selectedTheater?.id === t.id ? "#f7971e" : T.sub, cursor: "pointer", fontSize: "0.8rem", fontWeight: selectedTheater?.id === t.id ? 700 : 400, whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.15s" }}>
                      {t.name} <span style={{ opacity: 0.55, fontSize: "0.7rem" }}>{t.dist}mi</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Sliders + credits row */}
            <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row", gap: isMobile ? "18px" : "28px", flexWrap: "wrap", alignItems: "flex-start" }}>

              {/* Ads & Trailers (preshow offset) */}
              <div>
                <div style={{ fontSize: "0.68rem", color: T.muted, letterSpacing: "0.08em", marginBottom: "8px" }}>
                  ADS & TRAILERS: <span style={{ color: "#f7971e", fontWeight: 700 }}>{preshowOffset} min</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  <span style={{ fontSize: "0.72rem", color: T.faint }}>5</span>
                  <input type="range" min={5} max={35} step={1} value={preshowOffset} onChange={e => handlePreshowChange(Number(e.target.value))}
                    style={{ width: isMobile ? "100%" : "130px", flex: isMobile ? 1 : "none", accentColor: "#f7971e", cursor: "pointer" }} />
                  <span style={{ fontSize: "0.72rem", color: T.faint }}>35m</span>
                </div>
                <div style={{ fontSize: "0.7rem", color: T.muted, marginTop: "5px" }}>
                  {selectedTheater ? `auto-set for ${selectedTheater.chain || selectedTheater.name}` : "time before movie actually starts"}
                </div>
              </div>

              {/* Personal buffer */}
              <div>
                <div style={{ fontSize: "0.68rem", color: T.muted, letterSpacing: "0.08em", marginBottom: "8px" }}>
                  PERSONAL BUFFER: <span style={{ color: "#ffd200" }}>{buffer === 0 ? "none" : `${buffer} min`}</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                  <span style={{ fontSize: "0.72rem", color: T.faint }}>0</span>
                  <input type="range" min={0} max={30} step={5} value={buffer} onChange={e => handleBufferChange(Number(e.target.value))}
                    style={{ width: isMobile ? "100%" : "130px", flex: isMobile ? 1 : "none", accentColor: "#f7971e", cursor: "pointer" }} />
                  <span style={{ fontSize: "0.72rem", color: T.faint }}>30m</span>
                </div>
                <div style={{ fontSize: "0.7rem", color: T.muted, marginTop: "5px" }}>bathroom · snacks · walking</div>
              </div>

              {/* Skip Credits */}
              <div>
                <div style={{ fontSize: "0.68rem", color: T.muted, letterSpacing: "0.08em", marginBottom: "8px" }}>CREDITS</div>
                <button onClick={() => handleSkipCredits(!skipCredits)}
                  style={{ padding: "7px 16px", borderRadius: "20px", border: `1px solid ${skipCredits ? "#2ecc7177" : "#e67e2277"}`, background: skipCredits ? "#2ecc7118" : "#e67e2218", color: skipCredits ? "#2ecc71" : "#e67e22", cursor: "pointer", fontSize: "0.82rem", fontWeight: 700, transition: "all 0.2s" }}>
                  {skipCredits ? "✓ Skip Credits (−8 min)" : "⏳ Watch Full Credits"}
                </button>
                <div style={{ fontSize: "0.7rem", color: T.muted, marginTop: "5px" }}>
                  {skipCredits ? "More hopping options — leave before end" : "Fewer options but catch post-credits scenes"}
                </div>
              </div>

            </div>
          </div>

          {/* Estimates disclaimer */}
          <div style={{ fontSize: "0.7rem", color: T.faint, marginBottom: "12px", lineHeight: "1.55", paddingLeft: "2px" }}>
            ⚠️ Pre-show, trailer, and end-credit lengths are estimates and can vary by theater, date, and film. Build in extra buffer if you're cutting it close.
          </div>

          {/* Post-credits warning */}
          {postCreditsConflict && (
            <div style={{ background: T.warnBg, border: `1px solid ${T.warnBorder}`, borderRadius: "10px", padding: "10px 16px", marginBottom: "12px", fontSize: "0.82rem", color: "#e74c3c", lineHeight: "1.5" }}>
              ⚡ One or more movies in your plan have a mid or post-credits scene. Leaving during credits means you'd miss it.
            </div>
          )}

          {/* PLAN MY DAY */}
          <div id="plan-anchor" style={{ marginBottom: "16px" }}>
            <button onClick={() => { setPlanOpen(o => !o); if (planOpen) { setQuickSuggestions([]); setLockJustPicks([]); setLockFillGaps([]); setQuickPreset(null); setNoComboMsg(""); } }}
              style={{ width: "100%", textAlign: "left", background: "linear-gradient(135deg,#f7971e,#ffd200)", border: "none", borderRadius: planOpen ? "12px 12px 0 0" : "12px", padding: "12px 20px", cursor: "pointer", color: "#000", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: "0.95rem", fontWeight: 800 }}>🎯 Plan My Day</div>
                {!planOpen && <div style={{ fontSize: "0.75rem", fontWeight: 500, opacity: 0.65, marginTop: "2px" }}>Auto-build a schedule, or lock in your must-sees and we'll fill the rest</div>}
              </div>
              <span style={{ fontSize: "0.8rem", opacity: 0.7, flexShrink: 0, marginLeft: "12px" }}>{planOpen ? "▲ close" : "▼ open"}</span>
            </button>

            {planOpen && (
              <div style={{ background: T.planBg, border: `1px solid ${T.cardBorder}`, borderTop: "none", borderRadius: "0 0 12px 12px", padding: "20px" }}>

                {/* Tabs */}
                <div style={{ display: "flex", gap: "8px", marginBottom: "18px" }}>
                  {[["quick","⚡ Quick Plans"],["lockin","🔒 Lock In Movies"]].map(([mode,label]) => (
                    <button key={mode} onClick={() => { setPlanMode(mode); setQuickSuggestions([]); setLockJustPicks([]); setLockFillGaps([]); setQuickPreset(null); setNoComboMsg(""); }}
                      style={{ padding: "8px 18px", borderRadius: "20px", border: `1px solid ${planMode === mode ? "#f7971e" : T.inputBorder}`, background: planMode === mode ? "#f7971e22" : "transparent", color: planMode === mode ? "#f7971e" : T.sub, cursor: "pointer", fontSize: "0.85rem", fontWeight: planMode === mode ? 700 : 400, transition: "all 0.15s" }}>
                      {label}
                    </button>
                  ))}
                </div>

                {/* Quick Plans */}
                {planMode === "quick" && (
                  <div>
                    <p style={{ fontSize: "0.82rem", color: T.sub, marginBottom: "14px" }}>Choose a style — we'll find the best combinations available today.</p>
                    <div style={{ display: "flex", gap: "10px", flexWrap: "wrap" }}>
                      {[
                        ["most",     "🎬 Most Movies",   "Pack in as many films as possible"],
                        ["gaps",     "🧘 Fewest Gaps",   "Minimize dead time between movies"],
                        ["shortest", "⏱️ Shortest Day", "Done earliest, most compact schedule"],
                      ].map(([preset, label, desc]) => (
                        <button key={preset} onClick={() => handleQuickPlan(preset)}
                          style={{ padding: "12px 16px", borderRadius: "10px", border: `2px solid ${quickPreset === preset ? "#f7971e" : T.inputBorder}`, background: quickPreset === preset ? "#f7971e18" : T.input, color: quickPreset === preset ? "#f7971e" : T.text, cursor: "pointer", textAlign: "left", minWidth: isMobile ? "100%" : "155px", transition: "all 0.15s" }}>
                          <div style={{ fontWeight: 700, fontSize: "0.88rem", marginBottom: "3px" }}>{label}</div>
                          <div style={{ fontSize: "0.7rem", color: quickPreset === preset ? "#f7971eaa" : T.muted }}>{desc}</div>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Lock In */}
                {planMode === "lockin" && (
                  <div>
                    <p style={{ fontSize: "0.82rem", color: T.sub, marginBottom: "14px" }}>
                      Lock in your must-see movies and we'll build the best day around them.
                      <span style={{ color: T.muted }}> (Up to {MAX_LOCK_ENTRIES})</span>
                    </p>

                    <div style={{ display: "flex", flexDirection: "column", gap: "10px", marginBottom: "14px" }}>
                      {lockEntries.map((entry, idx) => (
                        <div key={idx} style={{ display: "flex", gap: "10px", alignItems: "flex-start" }}>
                          {/* Entry number badge */}
                          <div style={{ width: "24px", height: "24px", borderRadius: "50%", background: "#f7971e22", border: "1px solid #f7971e55", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.72rem", color: "#f7971e", fontWeight: 700, flexShrink: 0, marginTop: "22px" }}>
                            {idx + 1}
                          </div>
                          {/* Movie + Showtime sub-group */}
                          <div style={{ display: "flex", flex: "0 0 auto", gap: "10px", flexWrap: "wrap" }}>
                            {/* Movie picker */}
                            <div style={{ flex: isMobile ? "1 1 100%" : "0 0 auto" }}>
                              <div style={{ fontSize: "0.65rem", color: T.muted, letterSpacing: "0.08em", marginBottom: "5px" }}>MOVIE</div>
                              <select value={entry.movieId} onChange={e => updateLockEntry(idx, "movieId", e.target.value)}
                                style={{ background: T.input, color: T.text, border: `1px solid ${T.inputBorder}`, borderRadius: "8px", padding: "7px 12px", fontSize: "0.88rem", cursor: "pointer", width: "100%" }}>
                                <option value="">Pick a movie...</option>
                                {movies.map(m => (
                                  <option key={m.id} value={m.id}
                                    disabled={lockEntries.some((e, i) => i !== idx && e.movieId === String(m.id))}>
                                    {m.emoji} {m.title}
                                  </option>
                                ))}
                              </select>
                            </div>
                            {/* Showtime picker */}
                            {entry.movieId && (
                              <div style={{ flex: isMobile ? "1 1 100%" : "0 0 auto" }}>
                                <div style={{ fontSize: "0.65rem", color: T.muted, letterSpacing: "0.08em", marginBottom: "5px" }}>
                                  SHOWTIME <span style={{ color: T.faint }}>(optional)</span>
                                </div>
                                <select value={entry.showtime} onChange={e => updateLockEntry(idx, "showtime", e.target.value)}
                                  style={{ background: T.input, color: T.text, border: `1px solid ${T.inputBorder}`, borderRadius: "8px", padding: "7px 12px", fontSize: "0.88rem", cursor: "pointer", width: "100%" }}>
                                  <option value="">Any showtime</option>
                                  {(showtimes[Number(entry.movieId)] || []).filter(p => isJoinable(p)).map(p => (
                                    <option key={p} value={p}>{toTime(p)}</option>
                                  ))}
                                </select>
                              </div>
                            )}
                          </div>
                          {/* Remove button */}
                          {lockEntries.length > 1 && (
                            <button onClick={() => removeLockEntry(idx)}
                              style={{ padding: "7px 10px", borderRadius: "8px", border: `1px solid ${T.inputBorder}`, background: "transparent", color: T.muted, cursor: "pointer", fontSize: "0.8rem", marginTop: "22px" }}>
                              ✕
                            </button>
                          )}
                        </div>
                      ))}
                    </div>

                    {/* Add another + Build row */}
                    <div style={{ display: "flex", gap: "10px", alignItems: "center", flexWrap: "wrap" }}>
                      {lockEntries.length < MAX_LOCK_ENTRIES && (
                        <button onClick={addLockEntry}
                          style={{ padding: "8px 16px", borderRadius: "20px", border: `1px dashed #f7971e66`, background: "transparent", color: "#f7971e", cursor: "pointer", fontSize: "0.82rem" }}>
                          ＋ Add another must-see
                        </button>
                      )}
                      <button onClick={() => { if (lockEntries.some(e => e.movieId)) handleLockIn(); }}
                        style={{ padding: "9px 20px", borderRadius: "8px", border: "none", background: lockEntries.some(e => e.movieId) ? "#f7971e" : T.inputBorder, color: lockEntries.some(e => e.movieId) ? "#000" : T.muted, cursor: lockEntries.some(e => e.movieId) ? "pointer" : "default", fontWeight: 800, fontSize: "0.88rem", opacity: lockEntries.some(e => e.movieId) ? 1 : 0.5 }}>
                        Build My Day →
                      </button>
                    </div>
                  </div>
                )}

                {/* ── Quick Plans results ── */}
                {planMode === "quick" && quickSuggestions.length > 0 && (
                  <SuggestionList items={quickSuggestions} T={T} realStart={realStart} effectiveEnd={effectiveEnd} loadPlan={loadPlan} isMobile={isMobile} movies={movies} />
                )}

                {/* ── Lock In results: two sections ── */}
                {planMode === "lockin" && (lockJustPicks.length > 0 || lockFillGaps.length > 0) && (
                  <div style={{ marginTop: "20px", display: "flex", flexDirection: "column", gap: "24px" }}>

                    {/* Section 1: Just your picks */}
                    {lockJustPicks.length > 0 && (
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}>
                          <div style={{ height: "1px", flex: 1, background: T.cardBorder }} />
                          <span style={{ fontSize: "0.72rem", color: "#f7971e", fontWeight: 700, letterSpacing: "0.06em", whiteSpace: "nowrap" }}>
                            🔒 JUST YOUR PICKS
                          </span>
                          <div style={{ height: "1px", flex: 1, background: T.cardBorder }} />
                        </div>
                        <p style={{ fontSize: "0.75rem", color: T.muted, marginBottom: "10px" }}>Only the movies you locked in, scheduled as tightly as possible.</p>
                        <SuggestionList items={lockJustPicks} T={T} realStart={realStart} effectiveEnd={effectiveEnd} loadPlan={loadPlan} cardAccent="#f7971e" isMobile={isMobile} movies={movies} />
                      </div>
                    )}

                    {/* Section 2: Fill the gaps */}
                    {lockFillGaps.length > 0 && (
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "10px" }}>
                          <div style={{ height: "1px", flex: 1, background: T.cardBorder }} />
                          <span style={{ fontSize: "0.72rem", color: T.sub, fontWeight: 700, letterSpacing: "0.06em", whiteSpace: "nowrap" }}>
                            🎬 FILL THE GAPS
                          </span>
                          <div style={{ height: "1px", flex: 1, background: T.cardBorder }} />
                        </div>
                        <p style={{ fontSize: "0.75rem", color: T.muted, marginBottom: "10px" }}>Your picks plus other movies that fit around them.</p>
                        <SuggestionList items={lockFillGaps} T={T} realStart={realStart} effectiveEnd={effectiveEnd} loadPlan={loadPlan} isMobile={isMobile} movies={movies} />
                      </div>
                    )}
                  </div>
                )}

                {/* No combo / error message */}
                {noComboMsg && (
                  <div style={{ marginTop: "16px", background: T.warnBg, border: `1px solid ${T.warnBorder}`, borderRadius: "8px", padding: "12px 16px", fontSize: "0.82rem", color: "#e74c3c", lineHeight: "1.5" }}>
                    {noComboMsg === "no_general"
                      ? "No valid combinations found for the remaining showtimes. Try adjusting your buffer, enabling Skip Credits, or checking another day."
                      : noComboMsg}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* YOUR DAY */}
          {plan.length > 0 ? (
            <div style={{ background: T.card, border: "1px solid #f7971e22", borderRadius: "14px", padding: "20px", marginBottom: "20px" }}>
              <div style={{ fontSize: "0.68rem", color: T.muted, letterSpacing: "0.1em", fontWeight: 700, marginBottom: "14px" }}>
                YOUR PLAN &nbsp;·&nbsp; {dateOptions[dateIdx].label.toUpperCase()}
              </div>
              <div style={{ marginBottom: "20px" }}>
                <div style={{ display: isMobile ? "grid" : "flex", gridTemplateColumns: "1fr 1fr", gap: isMobile ? "14px 20px" : "0 28px", marginBottom: isMobile ? "14px" : "16px" }}>
                  {[
                    ["MOVIES",     `🎬 ${plan.length}`],
                    ["TOTAL TIME", `⏱️ ${toDuration(planLast-planFirst)}`],
                    ["ARRIVE",     `🚪 ${toTime(planFirst)}`],
                    ["LEAVE",      `🌙 ${toTime(planLast)}`],
                    ...(plan.length > 1 ? [
                      ["TOTAL GAP",   `↕ ${toDuration(totalGapMins)}`],
                      ["LONGEST GAP", `🍔 ${toDuration(longestGapMins)}`],
                    ] : []),
                  ].map(([label,val]) => (
                    <div key={label}>
                      <div style={{ fontSize: "0.65rem", color: T.muted, letterSpacing: "0.1em", marginBottom: "4px" }}>{label}</div>
                      <div style={{ fontSize: isMobile ? "1.15rem" : "1.5rem", fontWeight: 800, color: "#ffd200", lineHeight: 1 }}>{val}</div>
                    </div>
                  ))}
                </div>
                {!isMobile && (
                  <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
                    <button onClick={copyPlan}
                      style={{ padding: "8px 14px", borderRadius: "20px", border: `1px solid ${T.inputBorder}`, background: copied ? "#2ecc7122" : T.input, color: copied ? "#2ecc71" : T.sub, cursor: "pointer", fontSize: "0.8rem", fontWeight: copied ? 700 : 400, transition: "all 0.2s", whiteSpace: "nowrap" }}>
                      {copied ? "✓ Copied!" : "📋 Copy"}
                    </button>
                    <button onClick={copyLink} title="Copy a shareable URL — anyone with the link loads this exact plan"
                      style={{ padding: "8px 14px", borderRadius: "20px", border: "1px solid #27ae6055", background: "#27ae6011", color: "#27ae60", cursor: "pointer", fontSize: "0.8rem", fontWeight: 600, whiteSpace: "nowrap" }}>
                      🔗 Share Plan
                    </button>
                    {navigator.share && (
                      <button onClick={sharePlan} title="Share via system share sheet (OS)"
                        style={{ padding: "8px 14px", borderRadius: "20px", border: "1px solid #3498db55", background: "#3498db11", color: "#3498db", cursor: "pointer", fontSize: "0.8rem", fontWeight: 600, whiteSpace: "nowrap" }}>
                        📤 Send
                      </button>
                    )}
                    <button onClick={saveToCalendar}
                      style={{ padding: "8px 14px", borderRadius: "20px", border: "1px solid #8e44ad55", background: "#8e44ad11", color: "#8e44ad", cursor: "pointer", fontSize: "0.8rem", fontWeight: 600, whiteSpace: "nowrap" }}>
                      📅 Calendar
                    </button>
                    <button onClick={() => { offerUndo(plan); setPlan([]); setExpandedId(null); showToast("↺ Day reset"); }}
                      style={{ padding: "8px 14px", borderRadius: "20px", border: "1px solid #e74c3c55", background: "transparent", color: "#e74c3c", cursor: "pointer", fontSize: "0.8rem", fontWeight: 600, whiteSpace: "nowrap" }}>
                      ↺ Reset
                    </button>
                  </div>
                )}
              </div>

              {/* Timeline */}
              <div style={{ position: "relative", height: "52px", background: T.timeline, borderRadius: "10px", overflow: "hidden", marginBottom: "14px" }}>
                {(isMobile ? [9,12,15,18,21] : [9,11,13,15,17,19,21,23]).map(h => (
                  <div key={h} style={{ position: "absolute", left: pct(h*60), top: 0, bottom: 0, borderLeft: `1px solid ${T.timelineLine}` }}>
                    <span style={{ fontSize: "0.58rem", color: T.timelineText, position: "absolute", bottom: "4px", left: "3px" }}>{h>12?`${h-12}p`:`${h}a`}</span>
                  </div>
                ))}
                {plan.map((s, i) => {
                  const movie = movies.find(m => m.id === s.movieId);
                  const dur   = movie.runtime - (skipCredits ? CREDITS_ESTIMATE : 0);
                  return (
                    <div key={i} title={`${movie.title} · ${toTime(realStart(s.posted))}–${toTime(effectiveEnd(s.movieId,s.posted))}\nClick to remove this and all following movies`}
                      onClick={() => handleClick(s.movieId, s.posted)}
                      style={{ position: "absolute", left: pct(realStart(s.posted)), width: widthPct(dur), top: "7px", bottom: "7px", background: colorOf(s.movieId), borderRadius: "6px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.67rem", fontWeight: 700, overflow: "hidden", whiteSpace: "nowrap", padding: "0 6px", cursor: "pointer", boxShadow: `0 0 12px ${colorOf(s.movieId)}55` }}>
                      <span style={{ opacity: 0.75, marginRight: "3px" }}>{i+1}</span>{movie.emoji} {movie.title}
                    </div>
                  );
                })}
              </div>

              {/* Legend */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", alignItems: "center" }}>
                {plan.map((s, i) => {
                  const movie = movies.find(m => m.id === s.movieId);
                  const rs    = realStart(s.posted);
                  const re    = effectiveEnd(s.movieId, s.posted);
                  const gap   = i > 0 ? rs - effectiveEnd(plan[i-1].movieId, plan[i-1].posted) : null;
                  return (
                    <React.Fragment key={i}>
                      {gap !== null && (
                        <div style={{ fontSize: "0.75rem", color: gapColor(gap), fontWeight: 700, display: "flex", alignItems: "center", gap: "3px" }}>
                          {gapEmoji(gap)} {toDuration(gap)}
                        </div>
                      )}
                      <div style={{ display: "flex", alignItems: "center", gap: "7px", background: T.tagBg, borderRadius: "8px", padding: "7px 11px" }}>
                        <div style={{ width: "20px", height: "20px", borderRadius: "50%", background: colorOf(s.movieId)+"22", border: `1px solid ${colorOf(s.movieId)}66`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.7rem", fontWeight: 800, color: colorOf(s.movieId), flexShrink: 0 }}>{i+1}</div>
                        <span style={{ fontSize: "0.82rem", fontWeight: 600 }}>{movie.emoji} {movie.title}</span>
                        {movie.postCredits && <span title="Post-credits scene!" style={{ fontSize: "0.72rem" }}>⚡</span>}
                        <span style={{ fontSize: "0.74rem", color: T.muted }}>{toTime(rs)}–{toTime(re)}</span>
                        <button onClick={() => handleClick(s.movieId, s.posted)} title="Remove this movie and all following" style={{ background: "none", border: "none", color: T.faint, cursor: "pointer", fontSize: "0.72rem", padding: 0, lineHeight: 1 }}>✕</button>
                      </div>
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          ) : (
            <div style={{ background: T.card, border: `1px dashed ${T.dashed}`, borderRadius: "14px", padding: "26px", marginBottom: "20px", textAlign: "center" }}>
              <div style={{ fontSize: "1.8rem", marginBottom: "8px" }}>🎯</div>
              <div style={{ fontSize: "0.95rem", color: T.sub, marginBottom: "6px" }}>No plan yet</div>
              <div style={{ fontSize: "0.8rem", color: T.muted, marginBottom: "10px" }}>
                Use <strong style={{ color: "#f7971e" }}>Plan My Day ↑</strong> to auto-generate the best schedule,
                or pick showtimes directly from the movie cards below.
              </div>
              <div style={{ fontSize: "0.74rem", color: T.hint }}>Bright times = available &nbsp;·&nbsp; Dim times = conflicts with your current plan</div>
            </div>
          )}

          {/* DOT LEGEND */}
          {plan.length > 0 && (
            <div style={{ display: "flex", gap: "18px", alignItems: "center", marginBottom: "12px", flexWrap: "wrap", fontSize: "0.74rem", color: T.muted }}>
              <span style={{ fontWeight: 700, color: T.sub }}>Gap dots:</span>
              {[["#2ecc71", "15+ min", "comfortable"], ["#f39c12", "5–15 min", "tight"], ["#e74c3c", "<5 min", "very tight"]].map(([clr, range, label]) => (
                <span key={clr} style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                  <span style={{ width: "8px", height: "8px", borderRadius: "50%", background: clr, display: "inline-block", flexShrink: 0 }} />
                  <span><strong style={{ color: T.sub }}>{range}</strong> — {label}</span>
                </span>
              ))}
            </div>
          )}

          {/* MOVIE GRID */}
          {isLoadingMeta && (
            <div style={{ fontSize: "0.8rem", color: "#3498db", background: "#3498db11", border: "1px solid #3498db33", borderRadius: "10px", padding: "10px 16px", marginBottom: "12px", display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>⏳</span>
              Loading movie details from TMDB…
            </div>
          )}
          {isPlanning && (
            <div style={{ fontSize: "0.8rem", color: "#f7971e", background: "#f7971e11", border: "1px solid #f7971e33", borderRadius: "10px", padding: "10px 16px", marginBottom: "12px", display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>🎬</span>
              Finding the best schedules…
            </div>
          )}
          {tmdbKeyError && (
            <div style={{ fontSize: "0.8rem", color: "#e67e22", background: "#e67e2211", border: "1px solid #e67e2244", borderRadius: "10px", padding: "10px 16px", marginBottom: "12px", lineHeight: 1.5 }}>
              ⚠️ <strong>Posters and movie details unavailable</strong> — the TMDB API key isn't configured in your Cloudflare Worker.
              {" "}<a href="https://workers.cloudflare.com" target="_blank" rel="noopener noreferrer" style={{ color: "#f39c12" }}>Open Worker settings</a> → Variables → add secret <code style={{ background: "#e67e2222", padding: "1px 5px", borderRadius: "4px" }}>TMDB_API_KEY</code> → redeploy.
            </div>
          )}
          {!isLoadingData && movies.length === 0 && (
            <div style={{ background: T.card, border: `1px dashed ${T.dashed}`, borderRadius: "14px", padding: "36px", marginBottom: "20px", textAlign: "center" }}>
              <div style={{ fontSize: "2rem", marginBottom: "10px" }}>🎭</div>
              <div style={{ fontSize: "0.95rem", color: T.sub, marginBottom: "6px" }}>
                {selectedTheater ? "No showtimes found for this theater today." : "No theater selected yet."}
              </div>
              <div style={{ fontSize: "0.8rem", color: T.muted }}>
                {selectedTheater ? "Try a different date, or check back later." : "Search for a theater above to get started."}
              </div>
            </div>
          )}
          <div ref={ftueMovieGridRef} style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: isMobile ? "10px" : "14px", alignItems: "start" }}>
            {movies.map((movie) => {
              const anyJoinable = (showtimes[movie.id] || []).some(p => isJoinable(p));
              const expanded    = expandedId === movie.id;
              const inPlan      = plan.some(s => s.movieId === movie.id);
              const isExcluded  = excludedIds.includes(movie.id);
              return (
                <div key={movie.id} style={{ background: T.card, borderRadius: "12px", padding: "16px", border: `1px solid ${inPlan ? colorOf(movie.id) + "88" : colorOf(movie.id) + "22"}`, boxShadow: inPlan ? `0 0 18px ${colorOf(movie.id)}22` : "none", opacity: isExcluded ? 0.42 : 1, transition: "border-color 0.2s, box-shadow 0.2s, opacity 0.2s" }}>

                  {/* Header row */}
                  <div style={{ display: "flex", gap: "11px", marginBottom: "10px", alignItems: "flex-start" }}>
                    <div style={{ width: isMobile ? "54px" : "68px", height: isMobile ? "54px" : "68px", borderRadius: "10px", background: colorOf(movie.id)+"22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: isMobile ? "1.6rem" : "2rem", flexShrink: 0, position: "relative", overflow: "hidden" }}>
                      {/* Emoji always renders centered via flex — poster overlays it when available */}
                      {movie.emoji}
                      {(movie.posterPath || movie.fandangoPoster) && (
                        <img
                          key={movie.posterPath || movie.fandangoPoster}
                          src={movie.posterPath ? TMDB_IMG_BASE + movie.posterPath : movie.fandangoPoster}
                          alt={movie.title}
                          onError={e => { console.warn("[TH] Poster img failed to load:", e.target.src); e.target.style.display = 'none'; }}
                          style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", objectFit: "cover", borderRadius: "10px" }} />
                      )}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                        <span onClick={() => setExpandedId(expanded ? null : movie.id)}
                          style={{ fontWeight: 700, fontSize: "0.95rem", cursor: "pointer", flex: 1, minWidth: 0 }}
                          title={expanded ? "Hide info" : "Show synopsis & info"}>
                          {movie.title}
                        </span>
                        {movie.isMystery && <span title="Mystery screening — title revealed at showtime" style={{ fontSize: "0.6rem", fontWeight: 700, letterSpacing: "0.03em", background: "#9b59b622", color: "#9b59b6", border: "1px solid #9b59b655", borderRadius: "4px", padding: "1px 5px", flexShrink: 0 }}>🎟️ MYSTERY</span>}
                        {movie.postCredits && <span title="Has a post/mid-credits scene" style={{ fontSize: "0.72rem", flexShrink: 0 }}>⚡</span>}
                        <button onClick={() => setExpandedId(expanded ? null : movie.id)} title={expanded ? "Hide info" : "Show synopsis & info"}
                          style={{ marginLeft: "4px", width: isMobile ? "26px" : "20px", height: isMobile ? "26px" : "20px", borderRadius: "50%", border: `1px solid ${T.inputBorder}`, background: expanded ? "#f7971e22" : T.input, color: expanded ? "#f7971e" : T.muted, cursor: "pointer", fontSize: isMobile ? "0.8rem" : "0.65rem", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontWeight: 700 }}>
                          {expanded ? "▲" : "?"}
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); toggleExclude(movie.id); }}
                          title={isExcluded
                            ? "Re-include in auto-plans (currently excluded from Quick Plans and Fill the Gaps)"
                            : "Exclude from auto-plans — Quick Plans and Fill the Gaps will skip this movie. Click again to re-include."}
                          style={{ width: "20px", height: "20px", borderRadius: "50%", border: `1px solid ${isExcluded ? "#e74c3c88" : T.inputBorder}`, background: isExcluded ? "#e74c3c22" : T.input, color: isExcluded ? "#e74c3c" : T.muted, cursor: "pointer", fontSize: "0.65rem", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontWeight: 700, transition: "all 0.2s" }}>
                          {isExcluded ? "↩" : "✕"}
                        </button>
                      </div>
                      <div style={{ color: T.muted, fontSize: "0.74rem", marginTop: "2px" }}>{movie.genre} · {movie.rating} · {toDuration(movie.runtime)}</div>
                    </div>
                  </div>

                  {/* Expanded synopsis & info */}
                  {expanded && (
                    <div style={{ background: T.synopsisBg, borderRadius: "8px", padding: "12px 14px", marginBottom: "12px", lineHeight: "1.55", overflow: "hidden" }}>
                      {/* Large poster — floated so synopsis wraps around it naturally */}
                      {(movie.posterPath || movie.fandangoPoster) && (
                        <img
                          key={"large-" + (movie.posterPath || movie.fandangoPoster)}
                          src={movie.posterPath ? TMDB_IMG_LARGE + movie.posterPath : movie.fandangoPoster}
                          alt={movie.title}
                          onError={e => { e.target.style.display = 'none'; }}
                          style={{ float: "right", width: isMobile ? "72px" : "96px", borderRadius: "8px", marginLeft: "12px", marginBottom: "8px", display: "block" }} />
                      )}
                      {/* Synopsis */}
                      {movie.synopsis
                        ? <p style={{ fontSize: "0.8rem", color: T.sub, marginBottom: "10px" }}>{movie.synopsis}</p>
                        : isLoadingMeta && <p style={{ fontSize: "0.8rem", color: T.faint, marginBottom: "10px" }}>Loading details…</p>
                      }
                      {/* Meta row — only show rows with actual data */}
                      <div style={{ display: "flex", flexDirection: "column", gap: "5px", fontSize: "0.74rem" }}>
                        {movie.director && (
                          <div style={{ display: "flex", gap: "6px" }}>
                            <span style={{ color: T.muted, minWidth: "52px" }}>Director</span>
                            <span style={{ color: T.text, fontWeight: 600 }}>{movie.director}</span>
                          </div>
                        )}
                        {movie.cast?.length > 0 && (
                          <div style={{ display: "flex", gap: "6px" }}>
                            <span style={{ color: T.muted, minWidth: "52px" }}>Cast</span>
                            <span style={{ color: T.text }}>{movie.cast.join(", ")}</span>
                          </div>
                        )}
                        {movie.tmdbScore !== "?" && (
                          <div style={{ display: "flex", gap: "6px", alignItems: "center" }}>
                            <span style={{ color: T.muted, minWidth: "52px" }}>Score</span>
                            <span style={{ color: "#ffd200", fontWeight: 700 }}>★ {movie.tmdbScore}</span>
                            <span style={{ color: T.faint, fontSize: "0.68rem" }}>/ 10 · TMDB</span>
                          </div>
                        )}
                      </div>
                      {/* Post-credits note */}
                      {movie.postCredits && (
                        <div style={{ marginTop: "8px", fontSize: "0.72rem", color: "#f7971e", fontWeight: 600 }}>⚡ Stay for a post-credits scene</div>
                      )}
                      {/* Trailer link — only show when URL is available */}
                      {movie.trailerUrl && (
                        <a href={movie.trailerUrl} target="_blank" rel="noopener noreferrer"
                          style={{ display: "inline-flex", alignItems: "center", gap: "5px", marginTop: "10px", padding: "6px 12px", borderRadius: "20px", background: "#e74c3c22", border: "1px solid #e74c3c55", color: "#e74c3c", fontSize: "0.76rem", fontWeight: 700, textDecoration: "none", transition: "background 0.15s" }}
                          onMouseEnter={e => e.currentTarget.style.background = "#e74c3c33"}
                          onMouseLeave={e => e.currentTarget.style.background = "#e74c3c22"}>
                          {movie.isMystery ? "🎟️ Event Info" : "▶ Watch Trailer"}
                        </a>
                      )}
                    </div>
                  )}

                  {/* Showtime buttons */}
                  <div style={{ display: "flex", flexWrap: "wrap", gap: "7px" }}>
                    {(showtimes[movie.id] || []).map(posted => {
                      const sel   = isSelected(movie.id, posted);
                      const avail = isAvailable(movie.id, posted);
                      const join  = isJoinable(posted);
                      const gap   = gapFromLast(movie.id, posted);
                      const dot   = gap !== null ? gapColor(gap) : null;
                      const rs    = realStart(posted);
                      const re    = effectiveEnd(movie.id, posted);
                      const fmtStr  = formats[movie.id]?.[posted];
                      const fmtBadge = fmtStr
                        ? (FORMAT_BADGES[fmtStr] || { label: fmtStr.slice(0, 5).toUpperCase(), color: "#7f8c8d" })
                        : null;
                      const whyUnavail = () => {
                        if (plan.some(s => s.movieId === movie.id)) return "Already in your plan";
                        if (plan.length > 0) {
                          const last = plan[plan.length - 1];
                          const lastMovie = movies.find(m => m.id === last.movieId);
                          const actualGap = realStart(posted) - effectiveEnd(last.movieId, last.posted);
                          if (actualGap < 0) return `Overlaps with ${lastMovie.title} (ends ${toTime(effectiveEnd(last.movieId, last.posted))})`;
                          return `Only ${toDuration(actualGap)} gap after ${lastMovie.title} — need ${buffer} min`;
                        }
                        return "Not compatible with your current plan";
                      };
                      const tip = sel   ? "✕ Click to remove (and all movies after it)" :
                                  !join ? "This showing has already started" :
                                  !avail ? whyUnavail() :
                                  [
                                    `Start: ${toTime(rs)}   End: ${toTime(re)}`,
                                    `(${toTime(posted)} posted + ${offset} min preshow${skipCredits?" − 8 min credits":""})`,
                                    fmtStr ? `Format: ${fmtStr}` : "",
                                    gap !== null ? `Gap from last: ${toDuration(gap)} ${gapEmoji(gap)}` : "",
                                  ].filter(Boolean).join("\n");
                      return (
                        <button key={posted} onClick={() => handleClick(movie.id, posted)} title={tip}
                          style={{ padding: isMobile ? "9px 14px" : "6px 12px", borderRadius: "20px", border: "none", cursor: (avail || sel) ? "pointer" : "default", fontSize: "0.8rem", fontWeight: sel ? 700 : 400, background: sel ? colorOf(movie.id) : avail ? T.input : theme==="dark" ? "#0c0c16" : "#e8eaf2", color: sel ? "#fff" : avail ? T.text : T.faint, boxShadow: sel ? `0 0 10px ${colorOf(movie.id)}66` : "none", outline: dot && !sel ? `2px solid ${dot}55` : "none", transition: "all 0.15s", display: "flex", alignItems: "center", gap: "5px" }}>
                          {toTime(posted)}{sel ? " ✓" : ""}
                          {fmtBadge && !sel && (
                            <span style={{ fontSize: "0.58rem", fontWeight: 800, letterSpacing: "0.04em", background: fmtBadge.color + "22", color: fmtBadge.color, border: `1px solid ${fmtBadge.color}55`, borderRadius: "4px", padding: "1px 4px", lineHeight: 1.4, flexShrink: 0 }}>
                              {fmtBadge.label}
                            </span>
                          )}
                          {dot && !sel && avail && <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: dot, display: "inline-block", flexShrink: 0 }} />}
                        </button>
                      );
                    })}
                  </div>

                  {!anyJoinable && isToday && (
                    <div style={{ fontSize: "0.72rem", color: "#e74c3c99", marginTop: "9px" }}>All showings today have passed</div>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{ textAlign: "center", marginTop: "40px", paddingBottom: "24px", color: T.faint, fontSize: "0.72rem" }}>
            {usingLiveData
              ? <>Live data via Fandango &nbsp;·&nbsp; Movie details via TMDB &nbsp;·&nbsp; Preshow times are estimates</>
              : <>Demo mode — showtimes are illustrative · Enter a zip code to search real theaters</>}
          </div>

          {/* STICKY SHARE BAR — mobile only, when plan is active */}
          {isMobile && plan.length > 0 && (
            <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 200, background: "linear-gradient(135deg, #f7971e, #ffd200)", padding: "10px 14px", display: "flex", gap: "8px", alignItems: "center", boxShadow: "0 -4px 28px #f7971e66, 0 -2px 12px #00000044" }}>
              <button onClick={copyPlan}
                style={{ flex: 1, padding: "12px", borderRadius: "10px", border: "1px solid rgba(0,0,0,0.15)", background: copied ? "rgba(0,0,0,0.35)" : "rgba(0,0,0,0.18)", color: "#000", cursor: "pointer", fontSize: "0.88rem", fontWeight: 800, transition: "all 0.2s" }}>
                {copied ? "✓ Copied!" : "📋 Copy Plan"}
              </button>
              <button onClick={copyLink} title="Copy shareable link"
                style={{ flex: 1, padding: "12px", borderRadius: "10px", border: "1px solid rgba(0,0,0,0.15)", background: "rgba(0,0,0,0.18)", color: "#000", cursor: "pointer", fontSize: "0.88rem", fontWeight: 800 }}>
                🔗 Share
              </button>
              {navigator.share && (
                <button onClick={sharePlan} title="System share sheet"
                  style={{ padding: "12px 13px", borderRadius: "10px", border: "1px solid rgba(0,0,0,0.15)", background: "rgba(0,0,0,0.18)", color: "#000", cursor: "pointer", fontSize: "0.88rem", fontWeight: 800 }}>
                  📤
                </button>
              )}
              <button onClick={saveToCalendar} title="Add to Calendar"
                style={{ padding: "12px 13px", borderRadius: "10px", border: "1px solid rgba(0,0,0,0.15)", background: "rgba(0,0,0,0.18)", color: "#000", cursor: "pointer", fontSize: "0.88rem", fontWeight: 800 }}>
                📅
              </button>
              <button onClick={() => { offerUndo(plan); setPlan([]); setExpandedId(null); showToast("↺ Day reset"); }}
                style={{ padding: "12px 13px", borderRadius: "10px", border: "1px solid rgba(180,0,0,0.25)", background: "rgba(180,0,0,0.15)", color: "#5a0000", cursor: "pointer", fontSize: "0.88rem", fontWeight: 800 }}>
                ↺
              </button>
            </div>
          )}

          {/* SESSION HINT BANNER — fixed top, auto-dismisses after 6.5s */}
          {currentHint && ftueStep === 0 && (
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 9950, background: "linear-gradient(135deg, #f7971e, #ffd200)", color: "#000", padding: "11px 16px", fontSize: "0.82rem", fontWeight: 600, display: "flex", alignItems: "center", gap: "10px", boxShadow: "0 2px 14px #f7971e55", lineHeight: 1.4 }}>
              <span style={{ flex: 1 }}>{currentHint}</span>
              <button onClick={() => setCurrentHint(null)} style={{ background: "rgba(0,0,0,0.12)", border: "none", color: "#000", cursor: "pointer", fontSize: "0.85rem", fontWeight: 800, borderRadius: "50%", width: "24px", height: "24px", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>✕</button>
            </div>
          )}

          {/* FTUE SPOTLIGHT OVERLAY — 4-step walkthrough, once per day */}
          {ftueStep > 0 && (() => {
            const PAD = 10;
            const rect = spotlightRect;
            const STEP_CONTENT = {
              1: { icon: "👋", title: "Welcome to Theater Hopper!", body: "Enter your zip code below to find theaters near you — we'll pull live showtimes from Fandango.", cta: null },
              2: { icon: "📍", title: "Pick your theater", body: "Tap any theater in the list and we'll load today's movies automatically.", cta: null },
              3: { icon: "🎬", title: "Browse today's movies", body: "Tap any bright showtime to add it to your plan. Use Plan My Day to auto-build the perfect schedule.", cta: "Got it →" },
              4: { icon: "🎯", title: "How do you want to plan?", body: null, choice: true },
            };
            const step = STEP_CONTENT[ftueStep];

            return (
              <>
                {/* SVG dark overlay with transparent hole — pointerEvents:none so underlying UI still works */}
                <svg style={{ position: "fixed", inset: 0, width: "100%", height: "100%", zIndex: 9990, pointerEvents: "none" }}>
                  <defs>
                    <mask id="ftue-hole">
                      <rect width="100%" height="100%" fill="white" />
                      {rect && (
                        <rect x={rect.left - PAD} y={rect.top - PAD}
                              width={rect.width + PAD * 2} height={rect.height + PAD * 2}
                              rx="10" fill="black" />
                      )}
                    </mask>
                  </defs>
                  <rect width="100%" height="100%" fill="rgba(0,0,0,0.78)" mask="url(#ftue-hole)" />
                  {/* Spotlight glow ring */}
                  {rect && (
                    <rect x={rect.left - PAD} y={rect.top - PAD}
                          width={rect.width + PAD * 2} height={rect.height + PAD * 2}
                          rx="10" fill="none" stroke="#f7971e" strokeWidth="2.5" opacity="0.9" />
                  )}
                </svg>

                {/* Instruction card — always anchored at bottom center */}
                <div style={{ position: "fixed", left: "50%", bottom: isMobile ? "20px" : "40px", transform: "translateX(-50%)", zIndex: 9992, pointerEvents: "all",
                  background: theme === "dark" ? "#1a1a2e" : "#ffffff",
                  border: "2px solid #f7971e55", borderRadius: "18px",
                  padding: "20px 22px", maxWidth: "340px", width: "calc(100vw - 32px)",
                  boxShadow: "0 12px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(247,151,30,0.2)" }}>

                  {/* Step dots */}
                  <div style={{ display: "flex", gap: "5px", marginBottom: "14px", justifyContent: "center" }}>
                    {[1,2,3,4].map(n => (
                      <div key={n} style={{ width: n === ftueStep ? "18px" : "6px", height: "6px", borderRadius: "3px", background: n === ftueStep ? "#f7971e" : (n < ftueStep ? "#f7971e55" : (theme === "dark" ? "#2a2a40" : "#d0d4e8")), transition: "all 0.25s" }} />
                    ))}
                  </div>

                  <div style={{ fontSize: "1.4rem", marginBottom: "6px" }}>{step.icon}</div>
                  <div style={{ fontWeight: 800, fontSize: "1rem", color: T.text, marginBottom: "8px" }}>{step.title}</div>
                  {step.body && (
                    <div style={{ fontSize: "0.82rem", color: T.sub, lineHeight: 1.55, marginBottom: "16px" }}>{step.body}</div>
                  )}

                  {step.choice ? (
                    <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
                      <button
                        onClick={() => {
                          completeFtue();
                          setPlanOpen(true);
                          setTimeout(() => document.getElementById('plan-anchor')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                        }}
                        style={{ padding: "13px 16px", borderRadius: "10px", border: "none", background: "linear-gradient(135deg,#f7971e,#ffd200)", color: "#000", cursor: "pointer", fontWeight: 800, fontSize: "0.9rem", textAlign: "left" }}>
                        🎯 Auto-plan my day →
                      </button>
                      <button onClick={completeFtue}
                        style={{ padding: "13px 16px", borderRadius: "10px", border: `1px solid ${T.inputBorder}`, background: T.input, color: T.sub, cursor: "pointer", fontWeight: 600, fontSize: "0.88rem", textAlign: "left" }}>
                        🎬 I'll browse and pick my own
                      </button>
                    </div>
                  ) : (
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      {step.cta ? (
                        <button onClick={() => setFtueStep(4)}
                          style={{ padding: "10px 22px", borderRadius: "8px", border: "none", background: "linear-gradient(135deg,#f7971e,#ffd200)", color: "#000", cursor: "pointer", fontWeight: 800, fontSize: "0.88rem" }}>
                          {step.cta}
                        </button>
                      ) : (
                        <div style={{ fontSize: "0.74rem", color: T.faint, fontStyle: "italic" }}>
                          {ftueStep === 1 ? "↑ Type your zip code above" : ftueStep === 2 ? "↑ Tap a theater from the list" : ""}
                        </div>
                      )}
                      <button onClick={completeFtue}
                        style={{ background: "none", border: `1px solid ${T.inputBorder}`, color: T.faint, cursor: "pointer", fontSize: "0.75rem", padding: "5px 11px", borderRadius: "20px", fontWeight: 600 }}>
                        Skip tour
                      </button>
                    </div>
                  )}
                </div>
              </>
            );
          })()}

          {/* UNDO PILL — appears for 5s after a plan-clearing action */}
          {undoPlan && (
            <div style={{ position: "fixed", bottom: isMobile ? (plan.length > 0 ? "148px" : "24px") : "80px", left: "50%", transform: "translateX(-50%)", display: "flex", alignItems: "center", gap: "12px", background: T.card, border: `1px solid ${T.cardBorder}`, padding: "10px 16px 10px 18px", borderRadius: "24px", zIndex: 9998, boxShadow: "0 4px 20px #00000044", whiteSpace: "nowrap" }}>
              <span style={{ fontSize: "0.82rem", color: T.sub }}>Plan cleared</span>
              <button onClick={handleUndo} style={{ background: "#f7971e", border: "none", color: "#000", borderRadius: "12px", padding: "5px 14px", cursor: "pointer", fontSize: "0.8rem", fontWeight: 800 }}>
                ↩ Undo
              </button>
            </div>
          )}

          {/* TOAST — always 90px on mobile so it never jumps when the sticky bar disappears */}
          {toast && (
            <div style={{ position: "fixed", bottom: isMobile ? "90px" : "28px", left: "50%", transform: "translateX(-50%)", background: "#2ecc71", color: "#fff", padding: "11px 22px", borderRadius: "24px", fontWeight: 700, fontSize: "0.88rem", zIndex: 9999, pointerEvents: "none", boxShadow: "0 4px 24px #00000055", whiteSpace: "nowrap" }}>
              {toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
