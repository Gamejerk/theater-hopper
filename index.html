    function parseFandangoResponse(raw) {
      const theaterList = raw?.theaters || [];

      return theaterList.map(t => {
        const chainRaw = t.chainName || t.chainCode || "";
        const chain    = FANDANGO_CHAIN_MAP[chainRaw] || chainRaw;
        const dist     = Math.round((parseFloat(t.distance) || 0) * 10) / 10;
        const address  = t.fullAddress
          || [t.address1, t.city, t.state].filter(Boolean).join(", ");

        const _movies = (t.movies || []).map(m => {
          // Flatten showtimes from: variants → amenityGroups → showtimes
          const showtimes = [];
          for (const variant of (m.variants || [])) {
            for (const ag of (variant.amenityGroups || [])) {
              // Derive the real format name from amenity IDs.
              // filmFormatHeader is only "Standard" / "Premium Format" / "3D" — not specific.
              // The actual format (IMAX, Dolby Cinema, etc.) lives in ag.amenities[n].id / .name.
              let format = "Standard";
              const amenities = ag.amenities || [];
              // First pass: look for a known premium amenity ID
              const premiumMatch = amenities.find(a => PREMIUM_AMENITY_IDS[a.id]);
              if (premiumMatch) {
                format = PREMIUM_AMENITY_IDS[premiumMatch.id];
              } else if (variant.filmFormatHeader === "3D") {
                format = "3D";
              } else if (variant.filmFormatHeader === "Premium Format") {
                // Unknown premium format — use first non-ignored amenity name as fallback
                const named = amenities.find(a => !IGNORE_AMENITY_IDS.has(a.id) && a.name);
                if (named) format = named.name;
              }

              for (const st of (ag.showtimes || [])) {
                showtimes.push({
                  time:   st.date,   // "12:05p"
                  format,
                });
              }
            }
          }
          return {
            // Normalize ID to number so strict === comparisons work regardless of API type
            id:       typeof m.id === "number" ? m.id : (parseInt(m.id, 10) || m.id),
            title:    m.title   || "Unknown",
            rating:   m.rating  || "NR",
            runtime:  m.runtime ? parseInt(m.runtime, 10) : null,
            // Try every field name Fandango is known to use for the poster image
            poster:   m.poster || m.posterUrl || m.posterImage || m.imageUrl || m.artSmall || m.posterArtUrl || m.thumbnailUrl || null,
            genres:   m.genres  || [],
            showtimes,
          };
        });

        return {
          id:      t.formattedID || t.id || String(Math.random()),
          name:    t.name || "Unknown Theater",
          chain,
          address,
          dist,
          _movies,
        };
      });

    /** Returns a MYSTERY_EVENTS entry if the title matches, otherwise null. */
    function detectMysteryEvent(title) {
      if (!title) return null;
      return MYSTERY_EVENTS.find(e => e.pattern.test(title)) || null;
    }

    // ── Showtime string → minutes from midnight ───────────────────────────────
    function parseShowtime(timeStr) {
      if (timeStr == null) return null;
      if (typeof timeStr === "number") return timeStr;
      const s = String(timeStr).trim();
      // Fandango format: "12:05p" / "2:30p" / "10:15a" (not standard AM/PM)
      const mFan = s.match(/^(\d{1,2}):(\d{2})(a|p)$/i);
      if (mFan) {
        let h = parseInt(mFan[1], 10), m = parseInt(mFan[2], 10);
        if (mFan[3].toLowerCase() === "p" && h !== 12) h += 12;
        if (mFan[3].toLowerCase() === "a" && h === 12) h = 0;
        return h * 60 + m;
      }
      // Standard "10:30 AM" / "10:30 PM"
      const m12 = s.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (m12) {
        let h = parseInt(m12[1], 10), m = parseInt(m12[2], 10);
        if (m12[3].toUpperCase() === "PM" && h !== 12) h += 12;
        if (m12[3].toUpperCase() === "AM" && h === 12) h = 0;
        return h * 60 + m;
      }
      // "10:30" 24-hr
      const m24 = s.match(/^(\d{1,2}):(\d{2})$/);
      if (m24) return parseInt(m24[1], 10) * 60 + parseInt(m24[2], 10);
      // ISO timestamp
      if (s.includes("T")) {
        const d = new Date(s);
        if (!isNaN(d)) return d.getHours() * 60 + d.getMinutes();
      }
      return null;
    }

    // ── Build showtimes map  { movieId → [minutes, ...] } ────────────────────
    function buildShowtimesMap(fmList) {
      const out = {};
      fmList.forEach(fm => {
        const times = (fm.showtimes || [])
          .map(s => parseShowtime(s.time || s.startTime || s))
          .filter(t => t !== null)
          .sort((a, b) => a - b);
        out[fm.id] = [...new Set(times)];
      });
      return out;
    }

    // Builds { movieId: { posted: formatString } } — only non-Standard formats are stored.
    // Format string is resolved in parseFandangoTheaters via PREMIUM_AMENITY_IDS lookup.
    function buildFormatsMap(fmList) {
      const out = {};
      fmList.forEach(fm => {
        out[fm.id] = {};
        (fm.showtimes || []).forEach(s => {
          const posted = parseShowtime(s.time || s.startTime || s);
          if (posted === null) return;
          const fmt = s.format;
          if (!fmt || fmt === "Standard") return;
          if (!out[fm.id][posted]) out[fm.id][posted] = fmt; // keep first non-Standard seen
        });
      });
      return out;
    }

    // ── Enrich basic movie list with TMDB metadata (async) ───────────────────
    // Returns { movies: enrichedArray, keyMissing: bool }
    async function enrichWithTmdb(basicMovies, proxyUrl) {
      let keyMissing = false;
      const movies = await Promise.all(
        basicMovies.map(async (m) => {
          // Mystery/secret screenings: no TMDB lookup — keep pre-filled filler data
          if (m.isMystery) return m;
          // Cache hit — same Fandango movie ID seen before this session (e.g. date change on same theater)
          const cached = TMDB_CACHE.get(m.id);
          if (cached) return { ...m, ...cached };
          try {
            // Fandango appends "(2025)" / "(2026)" to titles — strip before TMDB search
            const yearMatch = m.title.match(/\((\d{4})\)\s*$/);
            const cleanTitle = m.title.replace(/\s*\(\d{4}\)\s*$/, "").trim();
            const year = yearMatch ? yearMatch[1] : null;

            const sqParams = { query: cleanTitle, language: "en-US", page: "1" };
            if (year) sqParams.year = year;
            const sq = new URLSearchParams(sqParams);
            const sr = await fetch(`${proxyUrl}/tmdb/search/movie?${sq}`);
            const sd = await sr.json();
            // Surface worker-level errors (e.g. TMDB_API_KEY not configured)
            if (!sr.ok) {
              console.warn("[TH] TMDB search HTTP", sr.status, "for", m.title, "—", sd?.error || "unknown error");
              if (sd?.error?.includes("not configured")) keyMissing = true;
              return m;
            }
            // Pick the best result: prefer year match, then fall back to top result
            let hit = null;
            if (year) {
              hit = (sd.results || []).find(r => r.release_date?.startsWith(year));
            }
            hit = hit || sd.results?.[0];
            // If still nothing with year, retry without year constraint
            if (!hit && year) {
              const sq2 = new URLSearchParams({ query: cleanTitle, language: "en-US", page: "1" });
              const sr2 = await fetch(`${proxyUrl}/tmdb/search/movie?${sq2}`);
              const sd2 = await sr2.json();
              hit = sd2.results?.[0];
            }
            if (!hit) return m; // no TMDB match — keep basic info

            const dr = await fetch(`${proxyUrl}/tmdb/movie/${hit.id}?append_to_response=credits,videos`);
            const d  = await dr.json();
            if (!dr.ok) {
              console.warn("[TH] TMDB detail HTTP", dr.status, "for", m.title, "—", d?.error || "unknown error");
              return m;
            }

            const primaryGenre = d.genres?.[0]?.name || "";
            // Resolve trailer URL directly from the appended videos — no separate /videos call needed
            const vids = d.videos?.results || [];
            const pick = vids.find(v => v.site === 'YouTube' && v.type === 'Trailer' && v.official)
                      || vids.find(v => v.site === 'YouTube' && v.type === 'Trailer')
                      || vids.find(v => v.site === 'YouTube');
            const trailerUrl = pick?.key
              ? `https://www.youtube.com/watch?v=${pick.key}`
              : `https://www.youtube.com/results?search_query=${encodeURIComponent((d.title || m.title) + " official trailer")}`;
            const enrichment = {
              title:      d.title || m.title,
              genre:      d.genres?.map(g => g.name).join(", ") || m.genre,
              runtime:    d.runtime  || m.runtime || 120,
              emoji:      GENRE_EMOJI[primaryGenre] || "🎬",
              postCredits:POST_CREDITS_IDS.has(d.id),
              director:   d.credits?.crew?.find(c => c.job === "Director")?.name || "",
              cast:       d.credits?.cast?.slice(0, 3).map(c => c.name) || [],
              tmdbScore:  d.vote_average ? d.vote_average.toFixed(1) : "?",
              posterPath: d.poster_path || null,
              synopsis:   d.overview   || "",
              trailerUrl,
              _tmdbId:    d.id,
            };
            tmdbCacheSet(m.id, enrichment); // persist across sessions
            return { ...m, ...enrichment };
          } catch (e) {
            console.warn("[TH] TMDB fetch failed for", m.title, "—", e.message);
            return m; // graceful fallback: keep basic info
          }
        })
      );
      return { movies, keyMissing };
    }


    // ── Utilities ────────────────────────────────────────────────────────────
    function toTime(min) {
      const h = Math.floor(min / 60), m = min % 60;
      const ampm = h >= 12 ? "PM" : "AM";
      const hour = h > 12 ? h - 12 : h === 0 ? 12 : h;
      return `${hour}:${m.toString().padStart(2, "0")} ${ampm}`;
    }
    function toDuration(min) {
      const h = Math.floor(min / 60), m = min % 60;
      if (h === 0) return `${m}m`;
      return m === 0 ? `${h}h` : `${h}h ${m}m`;
    }
    function colorOf(id) { return COLORS[(id - 1) % COLORS.length]; }

    function gapColor(g) { return g < 5 ? "#e74c3c" : g < 15 ? "#f39c12" : "#2ecc71"; }
    function gapEmoji(g) { return g < 5 ? "⚠️" : g < 15 ? "🟡" : "✅"; }

    const DAY_START = 9 * 60, DAY_END = 23 * 60, DAY_DUR = DAY_END - DAY_START;
    const pct      = (m) => `${Math.max(0, Math.min(100, ((m - DAY_START) / DAY_DUR) * 100))}%`;
    const widthPct = (m) => `${Math.max(0, (m / DAY_DUR) * 100)}%`;

            : d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }),
          isToday: i === 0,
          dateStr: d.toDateString(), // e.g. "Sat Apr 19 2026" — used for persistence + midnight detection
        };
      });
    }
    function getNowMinutes() { const n = new Date(); return n.getHours() * 60 + n.getMinutes(); }

    // ── TMDB metadata cache ──────────────────────────────────────────────────
    // Keyed by Fandango movie ID. Persists to localStorage with a 24-hour TTL
    // so repeat visits and page refreshes skip TMDB entirely for known movies.
    const TMDB_CACHE_TTL = 24 * 60 * 60 * 1000; // 24 hours in ms
    const TMDB_CACHE = new Map();
    // Load valid (non-expired) entries from localStorage on startup
    try {
      const stored = JSON.parse(localStorage.getItem('th_tmdb_cache') || '{}');
      const now = Date.now();
      Object.entries(stored).forEach(([key, entry]) => {
        if (entry?.ts && now - entry.ts < TMDB_CACHE_TTL) {
          TMDB_CACHE.set(Number(key), entry.data);
        }
      });
    } catch {}

    function tmdbCacheSet(id, data) {
      TMDB_CACHE.set(id, data);
      try {
        const stored = JSON.parse(localStorage.getItem('th_tmdb_cache') || '{}');
        stored[id] = { data, ts: Date.now() };
        // Prune expired entries so localStorage doesn't grow unbounded
        const now = Date.now();
        Object.keys(stored).forEach(k => {
          if (!stored[k]?.ts || now - stored[k].ts >= TMDB_CACHE_TTL) delete stored[k];
        });
        localStorage.setItem('th_tmdb_cache', JSON.stringify(stored));
      } catch {}
    }

    // ── Clipboard helpers (with execCommand fallback for HTTP / file://) ────
    function legacyCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
    }
    function copyToClipboard(text, onSuccess) {
      if (navigator.clipboard?.writeText) {
        navigator.clipboard.writeText(text).then(onSuccess).catch(() => { legacyCopy(text); onSuccess(); });
      } else {
        legacyCopy(text); onSuccess();
      }
    }

    // ── Combo Web Worker ─────────────────────────────────────────────────────
    // generateAllCombos + generateJustPicksCombos run off the main thread so
    // the UI never freezes on large multiplexes.  Serialised as a string so
    // this stays a single-file app — no build step needed.
    const COMBO_WORKER_CODE = `
      const CAP = 500;
      const realStart = (p, offset) => p + offset;
      const effectiveEnd = (movieId, p, runtimes, offset, skipCredits, ce) =>
        realStart(p, offset) + (runtimes[movieId] || 120) - (skipCredits ? ce : 0);

      function generateAllCombos(screenings, buffer, offset, runtimes, skipCredits, ce) {
        const results = [];
        function bt(cur) {
          if (results.length >= CAP) return;
          if (cur.length >= 2) results.push([...cur]);
          if (cur.length >= 4) return;
          const last = cur[cur.length - 1];
          const end  = effectiveEnd(last.movieId, last.posted, runtimes, offset, skipCredits, ce);
          for (const s of screenings) {
            if (results.length >= CAP) break;
            if (cur.some(c => c.movieId === s.movieId)) continue;
            if (realStart(s.posted, offset) >= end + buffer) { cur.push(s); bt(cur); cur.pop(); }
          }
        }
        screenings.forEach(s => { if (results.length < CAP) bt([s]); });
        return results;
      }

      function permutations(arr) {
        if (arr.length <= 1) return [[...arr]];
        return arr.flatMap((v, i) =>
          permutations([...arr.slice(0, i), ...arr.slice(i + 1)]).map(p => [v, ...p])
        );
      }

      function generateJustPicksCombos(lockMovieIds, lockEntries, lockScreenings, buffer, offset, runtimes, skipCredits, ce) {
        const perms   = permutations(lockMovieIds);
        const results = [];
        for (const perm of perms) {
          (function bt(idx, current, lastEnd) {
            if (idx === perm.length) {
              if (current.length >= 2) results.push([...current]);
              return;
            }
            const mid   = perm[idx];
            const entry = lockEntries.find(e => Number(e.movieId) === mid);
            const times = entry && entry.showtime ? [Number(entry.showtime)] : (lockScreenings[mid] || []);
            for (const posted of times) {
              if (idx === 0 || realStart(posted, offset) >= lastEnd + buffer) {
                current.push({ movieId: mid, posted });
                bt(idx + 1, current, effectiveEnd(mid, posted, runtimes, offset, skipCredits, ce));
                current.pop();
              }
            }
          })(0, [], 0);
        }
        return results;
      }

      self.onmessage = function({ data }) {
        const { id, screenings, buffer, offset, runtimes, skipCredits, ce,
                lockMovieIds, lockEntries, lockScreenings } = data;
        const allCombos = generateAllCombos(screenings, buffer, offset, runtimes, skipCredits, ce);
        const justPicksCombos = (lockMovieIds && lockMovieIds.length >= 2)
          ? generateJustPicksCombos(lockMovieIds, lockEntries, lockScreenings, buffer, offset, runtimes, skipCredits, ce)
          : null;
        self.postMessage({ id, allCombos, justPicksCombos });
      };
    `;

    // ── localStorage helpers ─────────────────────────────────────────────────
    function fromStorage(key, fallback) {
      try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    }
    function toStorage(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [chain,         setChain]         = useState(() => fromStorage('th_chain', "AMC"));
      const [preshowOffset, setPreshowOffset] = useState(() => {
        const saved = fromStorage('th_preshowOffset', null);
        if (saved !== null) return saved;
        return CHAIN_DATA[fromStorage('th_chain', "AMC")]?.offset ?? 20;
      });
      const [buffer,      setBuffer]      = useState(() => fromStorage('th_buffer', 10));
      const [plan,        setPlan]        = useState(() => {
        // Only restore plan if it was saved today — stale plans from other days are discarded
        const savedDate = fromStorage('th_savedDate', null);
        const today = new Date().toDateString();
        return savedDate === today ? fromStorage('th_plan', []) : [];
      });
      const [dateIdx,     setDateIdx]     = useState(() => {
        // Restore the selected date by matching the saved date string against today's options
        const savedDateStr = fromStorage('th_selectedDateStr', null);
        if (!savedDateStr) return 0;
        const opts = getDateOptions();
        const idx = opts.findIndex(d => d.dateStr === savedDateStr);
        return idx >= 0 ? idx : 0;
      });
      const [skipCredits, setSkipCredits] = useState(() => fromStorage('th_skipCredits', true));

      const [movies,          setMovies]          = useState([]);

      const [formats,         setFormats]         = useState({});   // { movieId: { posted: formatString } }

      const realStart       = (p)              => p + offset;
      const effectiveEndWith = (id, p, skip)   => realStart(p) + (movies.find(m => m.id === id)?.runtime ?? 120) - (skip ? CREDITS_ESTIMATE : 0);

      // ── Buffer: trim plan instead of clear ───────────────────────────────
      const handleBufferChange = (v) => {

      // ── Preshow offset: trim plan if gaps shrink below buffer ────────────
      const handlePreshowChange = (v) => {
        setPreshowOffset(v);
        for (let i = 1; i < plan.length; i++) {
          const prevEnd = plan[i-1].posted + v + (movies.find(m => m.id === plan[i-1].movieId)?.runtime ?? 120) - (skipCredits ? CREDITS_ESTIMATE : 0);
          if (plan[i].posted + v - prevEnd < buffer) {
            setPlan(plan.slice(0, i)); return;
          }
        }
      };

      // ── Skip credits: re-validate on turn-off ────────────────────────────
      const handleSkipCredits = (v) => {
        setSkipCredits(v);
        if (!v) {
          for (let i = 1; i < plan.length; i++) {
            if (realStart(plan[i].posted) - effectiveEndWith(plan[i-1].movieId, plan[i-1].posted, false) < buffer) {
              setPlan(plan.slice(0, i)); return;

          }
        }
      };

      // ── Manual click ─────────────────────────────────────────────────────
      const handleClick = (id, p) => {
        if (isSelected(id, p)) { setPlan(plan.slice(0, plan.findIndex(s => s.movieId === id && s.posted === p))); return; }

      };

      // ── Lock In entry management ─────────────────────────────────────────
      const clearLockResults = () => { setLockJustPicks([]); setLockFillGaps([]); setNoComboMsg(""); };
      const updateLockEntry  = (idx, field, val) => {
        const next = lockEntries.map((e, i) => i === idx ? { ...e, [field]: val, ...(field === "movieId" ? { showtime: "" } : {}) } : e);
        setLockEntries(next); clearLockResults();
        // Locking in a movie implicitly un-excludes it — you can't want it as a must-see while also skipping it

        }
      };
      const addLockEntry    = () => { if (lockEntries.length < MAX_LOCK_ENTRIES) setLockEntries([...lockEntries, { movieId: "", showtime: "" }]); };
      const removeLockEntry = (idx) => { setLockEntries(lockEntries.filter((_, i) => i !== idx)); clearLockResults(); };
      const toggleExclude = (id) => {
        const willExclude = !excludedIds.includes(id);
        setExcludedIds(prev => willExclude ? [...prev, id] : prev.filter(x => x !== id));
        if (willExclude) {
          // Auto-remove from Lock In — avoids confusing "no combos" dead-end when a locked movie is excluded
          setLockEntries(prev => {
            const next = prev.filter(e => String(e.movieId) !== String(id));
            return next.length > 0 ? next : [{ movieId: "", showtime: "" }];
          });
          clearLockResults();
        }
      };

      // ── Combo generation ─────────────────────────────────────────────────
      // generateAllCombos and generateJustPicksCombos run in a Web Worker (see COMBO_WORKER_CODE above).
      // A synchronous main-thread fallback kicks in automatically if Worker creation fails.
      // See sendComboRequest / buildWorkerData below.

      const scoreCombo = (combo) => {
        const first = realStart(combo[0].posted);
        const last  = effectiveEnd(combo[combo.length-1].movieId, combo[combo.length-1].posted);
        let totalGap = 0;
        for (let i = 1; i < combo.length; i++)
          totalGap += realStart(combo[i].posted) - effectiveEnd(combo[i-1].movieId, combo[i-1].posted);
        return { movieCount: combo.length, totalGap, totalTime: last - first };
      };

      const dedupeSlice = (scored, n = 3) => {
        const seen = new Set(), out = [];
        for (const item of scored) {
          const key = item.combo.map(s => `${s.movieId}:${s.posted}`).join(",");
          if (!seen.has(key)) { seen.add(key); out.push(item); }
          if (out.length === n) break;
        }
        return out;
      };

      const handleQuickPlan = (preset) => {
        setQuickPreset(preset); setNoComboMsg(""); setIsPlanning(true);
        setQuickSuggestions([]); setLockJustPicks([]); setLockFillGaps([]);
        sendComboRequest(buildWorkerData(), ({ allCombos }) => {
          setIsPlanning(false);
          if (!allCombos.length) { setQuickSuggestions([]); setNoComboMsg("no_general"); return; }
          const scored = allCombos.map(c => ({ combo: c, ...scoreCombo(c) }));
          const sorted =
            preset === "most" ? [...scored].sort((a,b) => b.movieCount-a.movieCount || a.totalGap-b.totalGap) :
            preset === "gaps" ? [...scored].sort((a,b) => a.totalGap-b.totalGap     || b.movieCount-a.movieCount) :
                                [...scored].sort((a,b) => a.totalTime-b.totalTime   || b.movieCount-a.movieCount);
          setQuickSuggestions(dedupeSlice(sorted));
        });
      };

      const handleLockIn = () => {
        const valid = lockEntries.filter(e => e.movieId);
        if (!valid.length) return;
        setNoComboMsg(""); setLockJustPicks([]); setLockFillGaps([]); setIsPlanning(true);

        const names = valid.map(e => movies.find(m => m.id === Number(e.movieId))?.title).filter(Boolean);

        // Build lock-specific data for the worker's justPicksCombos path
        const lockMovieIds = valid.length >= 2
          ? valid.map(e => movies.find(m => String(m.id) === String(e.movieId))?.id ?? Number(e.movieId))
          : null;
        const lockScreenings = {};
        if (lockMovieIds) {
          lockMovieIds.forEach(mid => {
            lockScreenings[mid] = (showtimes[mid] || []).filter(p => isJoinable(p));
          });
        }

        const workerData = { ...buildWorkerData(), lockMovieIds, lockEntries: valid, lockScreenings };

        sendComboRequest(workerData, ({ allCombos, justPicksCombos }) => {
          setIsPlanning(false);

          // ── Section 1: Just your picks ───────────────────────────────────
          if (justPicksCombos?.length) {
            const scored = justPicksCombos.map(c => ({ combo: c, ...scoreCombo(c) }));
            const sorted = [...scored].sort((a,b) => a.totalGap - b.totalGap || a.totalTime - b.totalTime);
            setLockJustPicks(dedupeSlice(sorted));
          }

          // ── Section 2: Fill the gaps ─────────────────────────────────────
          const filtered = allCombos.filter(combo =>
            valid.every(entry =>
              combo.some(s => s.movieId === Number(entry.movieId) && (!entry.showtime || s.posted === Number(entry.showtime)))
            )
          );
          if (filtered.length) {
            const scored = filtered.map(c => ({ combo: c, ...scoreCombo(c) }));

      // ── Plan stats ───────────────────────────────────────────────────────
      const planFirst = plan.length > 0 ? realStart(plan[0].posted) : null;

      const planGaps       = plan.slice(1).map((s, i) => realStart(s.posted) - effectiveEnd(plan[i].movieId, plan[i].posted));
      const totalGapMins   = planGaps.reduce((sum, g) => sum + g, 0);

      // ── Share helpers ────────────────────────────────────────────────────
      const generatePlanText = () => {
        const theaterName = selectedTheater ? selectedTheater.name : chain;
        const gaps = plan.slice(1).map((s, i) => realStart(s.posted) - effectiveEnd(plan[i].movieId, plan[i].posted));
        const totalGap = gaps.reduce((sum, g) => sum + g, 0);
        const hasPostCredits = plan.some(s => movies.find(m => m.id === s.movieId)?.postCredits);

        const lines = [
          `🎬 Theater Hopper — ${theaterName} · ${dateOptions[dateIdx].label}`,
          `Arrive: ${toTime(planFirst)}  |  Leave: ${toTime(planLast)}  |  ${toDuration(planLast - planFirst)} total`,
          ``,
        ];

        plan.forEach((s, i) => {
          const movie = movies.find(m => m.id === s.movieId);
          const rs = realStart(s.posted);
          const re = effectiveEnd(s.movieId, s.posted);
          if (i > 0) {
            const gap = rs - effectiveEnd(plan[i-1].movieId, plan[i-1].posted);

          lines.push(`${i+1}. ${movie.emoji} ${movie.title} · ${toTime(rs)} – ${toTime(re)}${movie.postCredits ? "  ⚡ post-credits scene!" : ""}`);

        lines.push(``);

        } else {

        lines.push(`⚙️  ${buffer} min personal buffer between movies`);
        if (hasPostCredits) {

      };
      const showToast = (msg) => {
        setToast(msg);

      // Save current plan for undo (used when theater change or reset clears it)

      // ── Save to Calendar (.ics) ──────────────────────────────────────────
      const saveToCalendar = () => {
        const selectedDate = new Date(dateOptions[dateIdx].dateStr);

        const theaterName = selectedTheater ? selectedTheater.name : chain;
        const theaterAddr = selectedTheater ? selectedTheater.address : '';
        const pad = (n) => String(n).padStart(2, '0');

        const uid = () => `${Date.now()}-${Math.random().toString(36).slice(2)}@theaterhop`;

        const lines = [
          'BEGIN:VCALENDAR',
          'VERSION:2.0',
          'PRODID:-//Theater Hopper//EN',
          'CALSCALE:GREGORIAN',
          'METHOD:PUBLISH',
        ];

        plan.forEach((s, i) => {
          const movie  = movies.find(m => m.id === s.movieId);

            ? realStart(plan[i+1].posted) - re : null;

            'BEGIN:VEVENT',
            `UID:${uid()}`,
            `DTSTART:${toIcsTime(rs)}`,
            `DTEND:${toIcsTime(re)}`,
            `SUMMARY:${movie.emoji} ${movie.title} @ ${theaterName}`,
            `DESCRIPTION:${desc}`,
            theaterAddr ? `LOCATION:${theaterAddr}` : '',
            'END:VEVENT',
          );
        });

        lines.push('END:VCALENDAR');

        const blob = new Blob([lines.filter(Boolean).join('\r\n')], { type: 'text/calendar;charset=utf-8' });
        const url  = URL.createObjectURL(blob);

      };

      // ── Shareable URL ────────────────────────────────────────────────────
      const copyLink = () => {
        const hash = plan.map(s => `${s.movieId}:${s.posted}`).join(',');
        const url  = `${window.location.origin}${window.location.pathname}#plan=${hash}`;
        copyToClipboard(url, () => showToast("🔗 Link copied!"));
      };

      // ── Theater finder helpers ───────────────────────────────────────────
      const filteredTheaters = theaters.filter(t => t.dist <= theaterRadius);

      // ── Shared movie-loading logic (used by selectTheater + date-change refresh) ──
      // Each call bumps movieGenRef so any in-flight TMDB enrichment from a previous
      // theater / date selection is silently discarded — no stale overwrites.
      const loadMoviesForTheater = (t) => {
        if (!t._movies?.length) return;
        const gen = ++movieGenRef.current;
        const basicMovies = t._movies.map(fm => {
          const mystery = detectMysteryEvent(fm.title);
          return {
            id: fm.id,
            title: mystery ? mystery.title : fm.title,
            genre: mystery ? mystery.genre : (fm.genres || []).join(", "),
            rating: (mystery && (!fm.rating || fm.rating === "NR")) ? mystery.rating : (fm.rating || "NR"),
            runtime: fm.runtime ? parseInt(fm.runtime, 10) : (mystery ? mystery.runtime : 120),
            emoji: mystery ? mystery.emoji : emojiFromFandangoGenres(fm.genres),
            postCredits: POST_CREDITS_IDS.has(fm.id),
            isMystery: !!mystery,
            director: "", cast: [], tmdbScore: "?",
            posterPath: null,
            // Fandango may return poster as an object — only keep it if it's a URL string
            fandangoPoster: typeof fm.poster === "string" && fm.poster.startsWith("http") ? fm.poster : null,
            synopsis: mystery ? mystery.synopsis : "",
            trailerUrl: mystery
              ? (mystery.trailerUrl || null)
              : `https://www.youtube.com/results?search_query=${encodeURIComponent(fm.title + " official trailer")}`,
          };
        });
        setMovies(basicMovies);
        setShowtimes(buildShowtimesMap(t._movies));
        setFormats(buildFormatsMap(t._movies));
        if (PROXY_URL) {
          setIsLoadingMeta(true); setTmdbKeyError(false);
          enrichWithTmdb(basicMovies, PROXY_URL)
            .then(({ movies: enriched, keyMissing }) => {
              if (movieGenRef.current === gen) {
                setMovies(enriched);
                setIsLoadingMeta(false);
                if (keyMissing) setTmdbKeyError(true);
              }
            })
            .catch(() => { if (movieGenRef.current === gen) setIsLoadingMeta(false); });
        }
      };

      const selectTheater = (t) => {
        offerUndo(plan); // save plan before clearing — user can undo for 5s
        setSelectedTheater(t);
        const resolvedChain = CHAIN_DATA[t.chain] ? t.chain : "AMC";
        setChain(resolvedChain);
        setPreshowOffset(CHAIN_DATA[resolvedChain]?.offset ?? 20);
        setTheaterOpen(false);
        showToast(plan.length > 0 ? "📍 Theater updated — plan cleared" : "📍 Theater settings loaded");
        setPlan([]); setExpandedId(null); setExcludedIds([]); setQuickSuggestions([]); setLockJustPicks([]); setLockFillGaps([]); setNoComboMsg(""); setQuickPreset(null);

        if (t._movies?.length && PROXY_URL) {
          loadMoviesForTheater(t);
        } else if (!PROXY_URL) {
          setMovies(DEMO_MOVIES);
          setShowtimes(DEMO_SHOWTIMES);
        }
        // else: theater has no movie data from live API — leave movies as-is
      };

      // ── Fetch theater list from Fandango NAPI via proxy ─────────────────────
      const fetchTheaters = React.useCallback(async (zip, dateStr, radius) => {
        if (!PROXY_URL) return;
        setIsLoadingData(true); setDataError(null);
        try {
